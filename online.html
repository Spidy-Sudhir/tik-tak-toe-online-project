<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Play Online - Tic Tac Toe</title>
  <link rel="stylesheet" href="online.css"/>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="game-container">
    <h1>Play Online 🌍</h1>
    <p id="playerInfo">Choose create or join room</p>

    <div class="board-wrapper">
      <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <canvas id="winCanvas"></canvas>
    </div>

    <button onclick="restartGame()">Restart</button>
  </div>

  <div id="startPopup" class="popup" style="display:flex;">
    <div class="popup-content">
      <h2>Online Multiplayer</h2>
      <button onclick="createRoom()">Create Room</button>
      <button onclick="openJoinPopup()">Join Room</button>
    </div>
  </div>

  <div id="joinPopup" class="popup">
    <div class="popup-content">
      <h2>Enter Room Code</h2>
      <input type="text" id="roomInput" maxlength="2" placeholder="12">
      <button onclick="joinRoom()">Join Now</button>
    </div>
  </div>

  <div id="popup" class="popup">
    <div class="popup-content">
      <h2 id="popupText"></h2>
      <button onclick="restartGame()">Play Again</button>
    </div>
  </div>

  <script type="module" src="online.js"></script>
</body>
</html>
