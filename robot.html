<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Play with Robot</title>
  <link rel="stylesheet" href="robot.css"/>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="game-container">
    <h1>Play with Robot 🤖</h1>
    <p id="playerInfo"></p>

    <div class="board-wrapper">
      <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <canvas id="winCanvas"></canvas>
    </div>

    <button onclick="restartGame()">Restart</button>
  </div>

  <!-- Choose Symbol Popup -->
  <div id="startPopup" class="popup" style="display:flex;">
    <div class="popup-content">
      <h2>Choose Your Symbol</h2>
      <button onclick="chooseSymbol('X')">Play as X</button>
      <button onclick="chooseSymbol('O')">Play as O</button>
    </div>
  </div>

  <!-- Result Popup -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <h2 id="popupText"></h2>
      <button onclick="restartGame()">Play Again</button>
    </div>
  </div>

  <script>
    // Background canvas
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    const particles = Array.from({ length: 60 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.5,
      speedX: (Math.random() - 0.5) * 0.3,
      speedY: (Math.random() - 0.5) * 0.3,
      opacity: Math.random() * 0.35 + 0.08
    }));

    function animateBg() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(192,132,252,${p.opacity})`;
        ctx.fill();
      });
      requestAnimationFrame(animateBg);
    }
    animateBg();
  </script>

  <script src="robot.js"></script>
</body>
</html>
